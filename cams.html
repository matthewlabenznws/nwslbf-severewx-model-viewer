<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CAMs Viewer</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #111 0%, #080808 100%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar, .subbar {
      text-align: left;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    .navbar {
      background: #1a1a1a;
      padding: 14px 24px;
      font-size: 22px;
    }

    .subbar {
      background: #151515;
      padding: 10px 24px;
      font-size: 16px;
    }

    .navbar a, .subbar a {
      color: white;
      text-decoration: none;
      margin: 0 8px;
      transition: 0.2s ease;
    }

    .navbar a:hover, .subbar a:hover {
      color: #6ea8ff;
      text-shadow: 0 0 10px rgba(110,168,255,0.35);
    }

    .navbar span, .subbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #555;
      padding: 7px 12px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    select:hover, button:hover {
      border-color: #6ea8ff;
      box-shadow: 0 0 10px rgba(110,168,255,0.2);
    }

    .topbar label {
      font-weight: bold;
    }

    .topbar select {
      min-width: 120px;
    }

    #runSelect {
      min-width: 170px;
    }

    #domainSelect {
      min-width: 150px;
    }

    #memberBlock {
      display: none;
    }

    #viewerTitle {
      font-size: 22px;
      font-weight: 800;
      margin-right: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 12px;
      padding: 12px 16px;
      background: #181818;
      border-bottom: 1px solid #2c2c2c;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      padding: 6px 10px 2px 10px;
      background: #101010;
    }

    .frame {
      min-width: 44px;
      padding: 6px 9px;
      border-radius: 5px;
      transition: 0.2s ease;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
      cursor: pointer;
    }

    .available:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(110,168,255,0.35);
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .frame:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .active {
      outline: 2px solid white;
    }

    .plot-wrap {
      padding: 12px 16px 40px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #plot {
      width: auto;
      max-width: 70vw;
      height: auto;
      max-height: none;
      border: 1px solid #333;
      border-radius: 10px;
      background: #000;
      box-shadow: 0 0 22px rgba(0,0,0,0.45);
      image-rendering: auto;
    }

    .footer {
      color: #777;
      font-size: 15px;
      margin: 28px 0 34px 0;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .navbar {
        font-size: 18px;
      }

      .subbar {
        font-size: 14px;
      }

      #viewerTitle {
        width: 100%;
        margin-bottom: 8px;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>
  <a href="cams.html?model=hrrr">CAMs</a>
  <span>/</span>
  <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="subbar">
  <a href="cams.html?model=hrrr">HRRR</a>
  <span>/</span>
  <a href="cams.html?model=rrfs">RRFS</a>
  <span>/</span>
  <a href="cams.html?model=refs&member=m01">REFS MEM01-05</a>
</div>

<div class="topbar">
  <b id="viewerTitle">HRRR Reflectivity/UH</b>

  <label>Model:</label>
  <select id="modelSelect" onchange="changeModel()">
    <option value="hrrr">HRRR</option>
    <option value="rrfs">RRFS</option>
    <option value="refs">REFS</option>
  </select>

  <span id="memberBlock">
    <label>Member:</label>
    <select id="memberSelect" onchange="changeMember()">
      <option value="m01">M01</option>
      <option value="m02">M02</option>
      <option value="m03">M03</option>
      <option value="m04">M04</option>
      <option value="m05">M05</option>
    </select>
  </span>

  <label>Product:</label>
  <select id="productSelect" onchange="changeProduct()"></select>

  <label>Run:</label>
  <select id="runSelect" onchange="changeRun()"></select>

  <label>Domain:</label>
  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>
</div>

<div class="controls">
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  <button onclick="latestRun()">Latest</button>
  <input id="slider" type="range" min="0" max="48" value="0">
  <div id="fhrLabel">000</div>
</div>

<div class="tiles" id="tiles"></div>

<div class="plot-wrap">
  <img id="plot" src="">
</div>

<div class="footer">
  Developed by Matthew Labenz<br>
  NWS North Platte, Nebraska
</div>

<script>
const BASE_URL = "https://mtl-nwslbf-model-data.s3.us-east-2.amazonaws.com";

const params = new URLSearchParams(window.location.search);

let selectedModel = params.get("model") || "hrrr";
let selectedMember = params.get("member") || "m01";
let selectedProduct = params.get("product") || "refl_uh";

let selectedRun = "";
let selectedDomain = "regional";
let current = 0;
let maxFhr = 18;
let availableFrames = [];
let playing = false;
let timer = null;
let runs = [];

const modelSelect = document.getElementById("modelSelect");
const memberSelect = document.getElementById("memberSelect");
const memberBlock = document.getElementById("memberBlock");
const productSelect = document.getElementById("productSelect");
const runSelect = document.getElementById("runSelect");
const domainSelect = document.getElementById("domainSelect");
const slider = document.getElementById("slider");
const plot = document.getElementById("plot");
const tiles = document.getElementById("tiles");
const fhrLabel = document.getElementById("fhrLabel");
const playBtn = document.getElementById("playBtn");
const viewerTitle = document.getElementById("viewerTitle");

modelSelect.value = selectedModel;
memberSelect.value = selectedMember;

function updateMemberVisibility() {
  memberBlock.style.display =
    selectedModel === "refs" ? "inline-flex" : "none";
}

function addProductOption(value, label) {
  const opt = document.createElement("option");
  opt.value = value;
  opt.textContent = label;
  productSelect.appendChild(opt);
}

function updateProductOptions() {

  productSelect.innerHTML = "";

  if (selectedModel === "hrrr") {
    addProductOption("refl_uh", "Reflectivity/UH");
    addProductOption("hail_swath", "Hail Swath");
    addProductOption("max_uh_02", "Max 0-2 km UH");
  }

  else if (selectedModel === "rrfs") {
    addProductOption("refl_uh", "Reflectivity/UH");
    addProductOption("hail_swath", "Hail Swath");
  }

  else if (selectedModel === "refs") {
    addProductOption("refl_uh", "Reflectivity/UH");
    addProductOption("hail_swath", "Hail Swath");
  }

  const values =
    Array.from(productSelect.options).map(o => o.value);

  if (!values.includes(selectedProduct)) {
    selectedProduct = values[0] || "refl_uh";
  }

  productSelect.value = selectedProduct;
}

function updateTitle() {

  let modelLabel = selectedModel.toUpperCase();

  if (selectedModel === "refs") {
    modelLabel = "REFS " + selectedMember.toUpperCase();
  }

  const productLabel =
    productSelect.options[
      productSelect.selectedIndex
    ]?.text || "";

  viewerTitle.textContent =
    `${modelLabel} ${productLabel}`;
}

function getProductPath() {

  if (selectedModel === "refs") {
    return `/runs/cams/refs/${selectedMember}/${selectedProduct}`;
  }

  return `/runs/cams/${selectedModel}/${selectedProduct}`;
}

function getFileName(fhr) {

  const f = String(fhr).padStart(3, "0");

  if (selectedModel === "refs") {

    if (selectedProduct === "hail_swath") {
      return `refs_${selectedMember}_hail_swath_f${f}.png`;
    }

    return `refs_${selectedMember}_lbf_f${f}.png`;
  }

  if (selectedProduct === "hail_swath") {
    return `${selectedModel}_hail_swath_f${f}.png`;
  }

  if (selectedProduct === "max_uh_02") {
    return `${selectedModel}_max_uh_02_f${f}.png`;
  }

  return `${selectedModel}_lbf_f${f}.png`;
}

function imgSrc(fhr) {

  if (!selectedRun) return "";

  return (
    BASE_URL +
    getProductPath() +
    "/" +
    selectedRun +
    "/" +
    selectedDomain +
    "/" +
    getFileName(fhr) +
    "?t=" +
    Date.now()
  );
}

function runId(run) {

  if (typeof run === "string") return run;

  return run.id;
}

function runLabel(run) {

  if (typeof run === "string") {
    return run.replace("_", " ");
  }

  return run.label || run.id;
}

function updateMaxFhrForRun() {

  const runObj =
    runs.find(r => runId(r) === selectedRun);

  if (
    runObj &&
    typeof runObj !== "string" &&
    runObj.max_fhr !== undefined
  ) {

    maxFhr = Number(runObj.max_fhr);

  } else {

    const hourText =
      selectedRun.split("_")[1] || "";

    const hour =
      Number(hourText.replace("z", ""));

    maxFhr =
      [0, 6, 12, 18].includes(hour)
      ? 48
      : 18;
  }

  slider.max = maxFhr;
}

async function loadRunsJson() {

  const runsPath =
    BASE_URL +
    getProductPath() +
    "/runs.json?t=" +
    Date.now();

  try {

    const response = await fetch(runsPath);

    const data = await response.json();

    runs = data.runs || [];

    if (runs.length > 0) {

      const oldRun = selectedRun;

      const runIds =
        runs.map(r => runId(r));

      if (runIds.includes(oldRun)) {
        selectedRun = oldRun;
      }

      else {
        selectedRun = runId(runs[0]);
      }

    } else {

      selectedRun = "";
    }

  } catch(err) {

    console.error(
      "Could not load runs.json:",
      runsPath,
      err
    );

    runs = [];
    selectedRun = "";
  }
}

function populateRunDropdown() {

  runSelect.innerHTML = "";

  runs.forEach(run => {

    const opt = document.createElement("option");

    opt.value = runId(run);

    opt.textContent = runLabel(run);

    runSelect.appendChild(opt);
  });

  runSelect.value = selectedRun;
}

async function refreshHourAvailability() {

  availableFrames = [];

  updateMaxFhrForRun();

  // Only build buttons if count changed
  if (tiles.children.length !== maxFhr + 1) {

    tiles.innerHTML = "";

    for (let f = 0; f <= maxFhr; f++) {

      const button =
        document.createElement("button");

      button.className = "frame missing";

      button.textContent =
        String(f).padStart(3, "0");

      button.disabled = true;

      button.dataset.fhr = f;

      button.onclick = () => {
        setFrame(f);
      };

      tiles.appendChild(button);
    }
  }

  // Only update state/styles
  for (let f = 0; f <= maxFhr; f++) {

    const button = tiles.children[f];

    try {

      const response =
        await fetch(imgSrc(f), {
          method: "HEAD"
        });

      if (response.ok) {

        availableFrames.push(f);

        button.disabled = false;

        button.className =
          "frame available";

      } else {

        button.disabled = true;

        button.className =
          "frame missing";
      }

    } catch(err) {

      button.disabled = true;

      button.className =
        "frame missing";
    }
  }

  updateActiveButton();
}

function firstAvailableFrame() {

  if (availableFrames.length === 0) {
    return 0;
  }

  return availableFrames[0];
}

function updateActiveButton() {

  document.querySelectorAll(".frame")
    .forEach(btn => {

      btn.classList.remove("active");

      if (
        Number(btn.dataset.fhr) === current
      ) {
        btn.classList.add("active");
      }
    });
}

function setFrame(fhr) {

  if (!selectedRun) return;

  current = Number(fhr);

  slider.value = current;

  fhrLabel.textContent =
    String(current).padStart(3, "0");

  plot.src = imgSrc(current);

  updateActiveButton();
}

slider.addEventListener("input", () => {

  const f = parseInt(slider.value);

  if (availableFrames.includes(f)) {
    setFrame(f);
  }

  else {
    slider.value = current;
  }
});

function togglePlay() {

  playing = !playing;

  playBtn.textContent =
    playing ? "⏸ Pause" : "▶ Play";

  if (!playing) {

    clearInterval(timer);

    return;
  }

  timer = setInterval(() => {

    if (availableFrames.length === 0) {
      return;
    }

    let idx =
      availableFrames.indexOf(current);

    idx++;

    if (idx >= availableFrames.length) {
      idx = 0;
    }

    setFrame(availableFrames[idx]);

  }, 700);
}

async function refreshViewer() {

  await loadRunsJson();

  populateRunDropdown();

  await refreshHourAvailability();

  if (
    current > maxFhr ||
    !availableFrames.includes(current)
  ) {

    setFrame(firstAvailableFrame());

  } else {

    setFrame(current);
  }
}

async function latestRun() {

  selectedRun = "";

  await refreshViewer();

  setFrame(firstAvailableFrame());
}

async function changeModel() {

  selectedModel = modelSelect.value;

  if (selectedModel !== "refs") {
    selectedMember = "m01";
  }

  else {
    selectedMember = memberSelect.value;
  }

  selectedProduct = "";
  selectedRun = "";

  updateMemberVisibility();

  updateProductOptions();

  updateTitle();

  await refreshViewer();
}

async function changeMember() {

  selectedMember = memberSelect.value;

  selectedRun = "";

  updateTitle();

  await refreshViewer();
}

async function changeProduct() {

  selectedProduct =
    productSelect.value;

  selectedRun = "";

  updateTitle();

  await refreshViewer();
}

async function changeRun() {

  selectedRun = runSelect.value;

  await refreshHourAvailability();

  if (
    current > maxFhr ||
    !availableFrames.includes(current)
  ) {

    setFrame(firstAvailableFrame());

  } else {

    setFrame(current);
  }
}

async function changeDomain() {

  selectedDomain =
    domainSelect.value;

  if (
    current > maxFhr ||
    !availableFrames.includes(current)
  ) {

    setFrame(firstAvailableFrame());

  } else {

    setFrame(current);
  }
}

async function init() {

  updateMemberVisibility();

  updateProductOptions();

  updateTitle();

  await refreshViewer();

  setFrame(firstAvailableFrame());

  setInterval(async () => {

    await refreshViewer();

  }, 30000);
}

init();
</script>

</body>
</html>
