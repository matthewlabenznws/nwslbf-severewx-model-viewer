<!DOCTYPE html>
<html>
<head>
  <title>CAMs Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background: #1a1a1a;
      padding: 12px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .navbar a:hover {
      color: #6ea8ff;
    }

    .navbar span {
      color: #777;
    }

    .subbar {
      background: #151515;
      padding: 9px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 16px;
      font-weight: bold;
    }

    .subbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .subbar a:hover {
      color: #6ea8ff;
    }

    .subbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 10px;
      border-bottom: 1px solid #444;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      font-weight: bold;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      padding: 8px 12px;
      background: #181818;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      padding: 8px;
      background: #0f0f0f;
    }

    .frame {
      min-width: 44px;
      padding: 5px 8px;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
      cursor: pointer;
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .frame:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .active {
      outline: 2px solid white;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 245px);
      border: 1px solid #333;
      background: #000;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>
  <a href="cams.html?model=hrrr">CAMs</a>
  <span>/</span>
  <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="subbar">
  <a href="cams.html?model=hrrr">HRRR</a>
  <span>/</span>
  <a href="cams.html?model=rrfs">RRFS</a>
  <span>/</span>
  <a href="cams.html?model=refs&member=m01">REFS MEM01-05</a>
</div>

<div class="topbar">
  <b id="viewerTitle">HRRR Reflectivity / UH</b>

  &nbsp;&nbsp;

  Model:
  <select id="modelSelect" onchange="changeModel()">
    <option value="hrrr">HRRR</option>
    <option value="rrfs">RRFS</option>
    <option value="refs">REFS</option>
  </select>

  &nbsp;&nbsp;

  <span id="memberBlock">
    Member:
    <select id="memberSelect" onchange="changeMember()">
      <option value="m01">M01</option>
      <option value="m02">M02</option>
      <option value="m03">M03</option>
      <option value="m04">M04</option>
      <option value="m05">M05</option>
    </select>
    &nbsp;&nbsp;
  </span>

  Product:
  <select id="productSelect" onchange="changeProduct()">
    <option value="refl_uh">Reflectivity/UH</option>
    <option value="hail_swath">Hail Swath</option>
  </select>

  &nbsp;&nbsp;

  Run:
  <select id="runSelect" onchange="changeRun()"></select>

  &nbsp;&nbsp;

  Domain:
  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>
</div>

<div class="controls">
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  <button onclick="latestRun()">Latest</button>
  <input id="slider" type="range" min="0" max="18" value="0">
  <div id="fhrLabel">000</div>
</div>

<div class="tiles" id="tiles"></div>

<br>

<img id="plot" src="">

<script>
const BASE_URL =
  "https://pub-7819f05640674537af897dbdd15c5d0c.r2.dev";

const params =
  new URLSearchParams(window.location.search);

let selectedModel =
  params.get("model") || "hrrr";

let selectedMember =
  params.get("member") || "m01";

let selectedProduct =
  params.get("product") || "refl_uh";

let runs = [];
let selectedRun = "";
let selectedDomain = "regional";
let current = 0;
let maxFhr = 18;
let playing = false;
let timer = null;

const modelSelect = document.getElementById("modelSelect");
const memberSelect = document.getElementById("memberSelect");
const productSelect = document.getElementById("productSelect");
const memberBlock = document.getElementById("memberBlock");
const runSelect = document.getElementById("runSelect");
const domainSelect = document.getElementById("domainSelect");
const plot = document.getElementById("plot");
const slider = document.getElementById("slider");
const tiles = document.getElementById("tiles");
const fhrLabel = document.getElementById("fhrLabel");
const playBtn = document.getElementById("playBtn");
const viewerTitle = document.getElementById("viewerTitle");

modelSelect.value = selectedModel;
memberSelect.value = selectedMember;
productSelect.value = selectedProduct;

function getProductPath() {
  if (selectedModel === "refs") {
    return "/runs/cams/refs/" +
      selectedMember + "/" +
      selectedProduct;
  }

  return "/runs/cams/" +
    selectedModel + "/" +
    selectedProduct;
}

function productLabel() {
  if (selectedProduct === "hail_swath") return "Hail Swath";
  if (selectedProduct === "refl_uh") return "Reflectivity / UH";
  return selectedProduct;
}

function updateTitle() {
  let modelLabel = selectedModel.toUpperCase();

  if (selectedModel === "refs") {
    modelLabel = "REFS " + selectedMember.toUpperCase();
  }

  viewerTitle.textContent =
    modelLabel + " " + productLabel();
}

function updateMemberVisibility() {
  if (selectedModel === "refs") {
    memberBlock.style.display = "inline";
  } else {
    memberBlock.style.display = "none";
  }
}

function fhrName(fhr) {
  return String(fhr).padStart(3, "0");
}

function getFileName(fhr) {
  const f = fhrName(fhr);

  if (selectedModel === "refs") {
    if (selectedProduct === "hail_swath") {
      return "refs_" + selectedMember + "_hail_swath_f" + f + ".png";
    }

    return "refs_" + selectedMember + "_lbf_f" + f + ".png";
  }

  if (selectedProduct === "hail_swath") {
    return selectedModel + "_hail_swath_f" + f + ".png";
  }

  return selectedModel + "_lbf_f" + f + ".png";
}

function imgSrc(fhr) {
  if (!selectedRun) return "";

  return BASE_URL +
    getProductPath() + "/" +
    selectedRun + "/" +
    selectedDomain + "/" +
    getFileName(fhr) +
    "?t=" +
    Date.now();
}

async function loadRunsJson() {
  try {
    const response =
      await fetch(
        BASE_URL +
        getProductPath() +
        "/runs.json?t=" +
        Date.now()
      );

    const data = await response.json();
    runs = data.runs || [];

  } catch (e) {
    console.warn("Could not load runs.json", e);
    runs = [];
  }
}

function runId(run) {
  if (typeof run === "string") return run;
  return run.id;
}

function runLabel(run) {
  if (typeof run === "string") return run.replace("_", " ");
  return run.label || run.id;
}

function getRunObjById(id) {
  return runs.find(run => runId(run) === id);
}

function updateMaxFhrForRun() {
  const runObj = getRunObjById(selectedRun);

  if (
    runObj &&
    typeof runObj !== "string" &&
    runObj.max_fhr !== undefined
  ) {
    maxFhr = Number(runObj.max_fhr);
  } else {
    const hourText = selectedRun.split("_")[1] || "";
    const hour = Number(hourText.replace("z", ""));

    maxFhr =
      [0, 6, 12, 18].includes(hour)
      ? 48
      : 18;
  }

  slider.max = maxFhr;
  buildHourButtons();
}

function populateRunDropdown() {
  const oldRun = selectedRun;
  runSelect.innerHTML = "";

  runs.forEach(run => {
    const opt = document.createElement("option");
    opt.value = runId(run);
    opt.textContent = runLabel(run);
    runSelect.appendChild(opt);
  });

  const runIds = runs.map(run => runId(run));

  if (runIds.includes(oldRun)) {
    selectedRun = oldRun;
  } else {
    selectedRun = runIds[0] || "";
  }

  runSelect.value = selectedRun;
  updateMaxFhrForRun();
}

function buildHourButtons() {
  tiles.innerHTML = "";
  slider.max = maxFhr;

  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.createElement("button");

    btn.className = "frame missing";
    btn.id = "btn" + i;
    btn.textContent = fhrName(i);
    btn.disabled = true;

    btn.onclick = () => {
      if (!btn.classList.contains("available")) return;
      setFrame(i);
    };

    tiles.appendChild(btn);
  }
}

function setFrame(fhr) {
  const target = Number(fhr);
  const btn = document.getElementById("btn" + target);

  if (btn && !btn.classList.contains("available")) {
    return;
  }

  current =
    Math.max(
      0,
      Math.min(maxFhr, target)
    );

  slider.value = current;
  fhrLabel.textContent = fhrName(current);

  const src = imgSrc(current);

  if (src) {
    plot.src = src;
  }

  document
    .querySelectorAll(".frame")
    .forEach(btn => btn.classList.remove("active"));

  const active =
    document.getElementById("btn" + current);

  if (active) {
    active.classList.add("active");
  }
}

function refreshHourAvailability() {
  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.getElementById("btn" + i);
    if (!btn) continue;

    btn.classList.remove("available", "missing");
    btn.classList.add("missing");
    btn.disabled = true;

    const testImg = new Image();

    testImg.onload = function() {
      btn.classList.remove("missing");
      btn.classList.add("available");
      btn.disabled = false;
    };

    testImg.onerror = function() {
      btn.classList.remove("available");
      btn.classList.add("missing");
      btn.disabled = true;
    };

    testImg.src = imgSrc(i);
  }
}

function firstAvailableFrame() {
  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.getElementById("btn" + i);
    if (btn && btn.classList.contains("available")) {
      return i;
    }
  }

  return 0;
}

function changeRun() {
  selectedRun = runSelect.value;
  current = 0;

  updateMaxFhrForRun();
  refreshHourAvailability();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

function changeDomain() {
  selectedDomain = domainSelect.value;

  refreshHourAvailability();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

async function changeModel() {
  selectedModel = modelSelect.value;
  selectedMember = memberSelect.value;
  current = 0;
  selectedRun = "";
  plot.src = "";

  updateMemberVisibility();
  updateTitle();

  await refreshViewer();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

async function changeMember() {
  selectedMember = memberSelect.value;
  current = 0;
  selectedRun = "";
  plot.src = "";

  updateTitle();

  await refreshViewer();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

async function changeProduct() {
  selectedProduct = productSelect.value;
  current = 0;
  selectedRun = "";
  plot.src = "";

  updateTitle();

  await refreshViewer();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

function latestRun() {
  selectedRun =
    runs.length > 0
    ? runId(runs[0])
    : "";

  runSelect.value = selectedRun;
  current = 0;

  updateMaxFhrForRun();
  refreshHourAvailability();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);
}

function togglePlay() {
  playing = !playing;

  if (playing) {
    playBtn.textContent = "⏸ Pause";

    timer =
      setInterval(() => {
        let next = current + 1;

        for (let tries = 0; tries <= maxFhr; tries++) {
          if (next > maxFhr) next = 0;

          const btn = document.getElementById("btn" + next);

          if (btn && btn.classList.contains("available")) {
            setFrame(next);
            return;
          }

          next++;
        }

      }, 650);

  } else {
    playBtn.textContent = "▶ Play";
    clearInterval(timer);
  }
}

slider.oninput =
  function() {
    const target = Number(slider.value);
    const btn = document.getElementById("btn" + target);

    if (btn && btn.classList.contains("available")) {
      setFrame(target);
    } else {
      slider.value = current;
    }
  };

async function refreshViewer() {
  await loadRunsJson();
  populateRunDropdown();
  refreshHourAvailability();
}

async function init() {
  updateMemberVisibility();
  updateTitle();

  await loadRunsJson();
  populateRunDropdown();
  refreshHourAvailability();

  setTimeout(() => {
    setFrame(firstAvailableFrame());
  }, 400);

  setInterval(async () => {
    await refreshViewer();
  }, 30000);
}

init();
</script>

</body>
</html>
