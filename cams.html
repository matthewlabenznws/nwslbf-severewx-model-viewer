<!DOCTYPE html>
<html>
<head>
  <title>CAMs Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background: #1a1a1a;
      padding: 12px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .navbar a:hover {
      color: #6ea8ff;
    }

    .navbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 10px;
      border-bottom: 1px solid #444;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      font-weight: bold;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      padding: 8px 12px;
      background: #181818;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      padding: 8px;
      background: #0f0f0f;
    }

    .frame {
      min-width: 44px;
      padding: 5px 8px;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .active {
      outline: 2px solid white;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 210px);
      border: 1px solid #333;
      background: #000;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>

  <a href="cams.html?model=hrrr">HRRR</a>
  <span>/</span>

  <a href="cams.html?model=rrfs">RRFS</a>
</div>

<div class="topbar">
  <b id="viewerTitle">HRRR Reflectivity / UH</b>

  &nbsp;&nbsp;

  Run:
  <select id="runSelect" onchange="changeRun()"></select>

  &nbsp;&nbsp;

  Domain:
  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>
</div>

<div class="controls">
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>

  <button onclick="latestRun()">Latest</button>

  <input id="slider" type="range" min="0" max="18" value="0">

  <div id="fhrLabel">000</div>
</div>

<div class="tiles" id="tiles"></div>

<br>

<img id="plot" src="">

<script>
const BASE_URL =
  "https://pub-7819f05640674537af897dbdd15c5d0c.r2.dev";

const params =
  new URLSearchParams(window.location.search);

let selectedModel =
  params.get("model") || "hrrr";

let runs = [];
let selectedRun = "";
let selectedDomain = "regional";
let current = 0;
let maxFhr = 18;
let playing = false;
let timer = null;

const runSelect =
  document.getElementById("runSelect");

const domainSelect =
  document.getElementById("domainSelect");

const plot =
  document.getElementById("plot");

const slider =
  document.getElementById("slider");

const tiles =
  document.getElementById("tiles");

const fhrLabel =
  document.getElementById("fhrLabel");

const playBtn =
  document.getElementById("playBtn");

const viewerTitle =
  document.getElementById("viewerTitle");


function getProductPath() {
  return "/runs/cams/" +
    selectedModel +
    "/refl_uh";
}


function updateTitle() {
  viewerTitle.textContent =
    selectedModel.toUpperCase() +
    " Reflectivity / UH";
}


function fhrName(fhr) {
  return String(fhr).padStart(3, "0");
}


function getFilePrefix() {
  return selectedModel + "_lbf_f";
}


function imgSrc(fhr) {
  if (!selectedRun) return "";

  return BASE_URL +
    getProductPath() + "/" +
    selectedRun + "/" +
    selectedDomain + "/" +
    getFilePrefix() +
    fhrName(fhr) +
    ".png?t=" +
    Date.now();
}


async function loadRunsJson() {
  try {
    const response =
      await fetch(
        BASE_URL +
        getProductPath() +
        "/runs.json?t=" +
        Date.now()
      );

    const data =
      await response.json();

    runs =
      data.runs || [];

  } catch (e) {
    console.warn("Could not load runs.json", e);
    runs = [];
  }
}


function runId(run) {
  if (typeof run === "string") {
    return run;
  }

  return run.id;
}


function runLabel(run) {
  if (typeof run === "string") {
    return run.replace("_", " ");
  }

  return run.label || run.id;
}


function getRunObjById(id) {
  return runs.find(run => runId(run) === id);
}


function updateMaxFhrForRun() {
  const runObj =
    getRunObjById(selectedRun);

  if (
    runObj &&
    typeof runObj !== "string" &&
    runObj.max_fhr !== undefined
  ) {
    maxFhr =
      Number(runObj.max_fhr);
  }
  else {
    const hourText =
      selectedRun.split("_")[1] || "";

    const hour =
      Number(hourText.replace("z", ""));

    maxFhr =
      [0, 6, 12, 18].includes(hour)
      ? 48
      : 18;
  }

  slider.max =
    maxFhr;

  buildHourButtons();
}


function populateRunDropdown() {
  const oldRun =
    selectedRun;

  runSelect.innerHTML = "";

  runs.forEach(run => {
    const opt =
      document.createElement("option");

    opt.value =
      runId(run);

    opt.textContent =
      runLabel(run);

    runSelect.appendChild(opt);
  });

  const runIds =
    runs.map(run => runId(run));

  if (runIds.includes(oldRun)) {
    selectedRun = oldRun;
  }
  else {
    selectedRun = runIds[0] || "";
  }

  runSelect.value =
    selectedRun;

  updateMaxFhrForRun();
}


function buildHourButtons() {
  tiles.innerHTML = "";

  slider.max =
    maxFhr;

  for (let i = 0; i <= maxFhr; i++) {
    const btn =
      document.createElement("button");

    btn.className =
      "frame missing";

    btn.id =
      "btn" + i;

    btn.textContent =
      fhrName(i);

    btn.onclick =
      () => setFrame(i);

    tiles.appendChild(btn);
  }
}


function setFrame(fhr) {
  current =
    Math.max(
      0,
      Math.min(maxFhr, Number(fhr))
    );

  slider.value =
    current;

  fhrLabel.textContent =
    fhrName(current);

  const src =
    imgSrc(current);

  if (src) {
    plot.src = src;
  }

  document
    .querySelectorAll(".frame")
    .forEach(btn =>
      btn.classList.remove("active")
    );

  const active =
    document.getElementById(
      "btn" + current
    );

  if (active) {
    active.classList.add("active");
  }
}


function refreshHourAvailability() {
  for (let i = 0; i <= maxFhr; i++) {
    const btn =
      document.getElementById("btn" + i);

    if (!btn) continue;

    btn.classList.remove(
      "available",
      "missing"
    );

    btn.classList.add("missing");

    const testImg =
      new Image();

    testImg.onload =
      function() {
        btn.classList.remove("missing");
        btn.classList.add("available");
      };

    testImg.onerror =
      function() {
        btn.classList.remove("available");
        btn.classList.add("missing");
      };

    testImg.src =
      imgSrc(i);
  }
}


function changeRun() {
  selectedRun =
    runSelect.value;

  current = 0;

  updateMaxFhrForRun();

  refreshHourAvailability();

  setFrame(0);
}


function changeDomain() {
  selectedDomain =
    domainSelect.value;

  refreshHourAvailability();

  setFrame(current);
}


function latestRun() {
  selectedRun =
    runs.length > 0
    ? runId(runs[0])
    : "";

  runSelect.value =
    selectedRun;

  current = 0;

  updateMaxFhrForRun();

  refreshHourAvailability();

  setFrame(0);
}


function togglePlay() {
  playing = !playing;

  if (playing) {
    playBtn.textContent =
      "⏸ Pause";

    timer =
      setInterval(() => {
        current =
          current >= maxFhr
          ? 0
          : current + 1;

        setFrame(current);
      }, 650);
  }
  else {
    playBtn.textContent =
      "▶ Play";

    clearInterval(timer);
  }
}


slider.oninput =
  function() {
    setFrame(slider.value);
  };


async function refreshViewer() {
  await loadRunsJson();

  populateRunDropdown();

  refreshHourAvailability();
}


async function init() {
  updateTitle();

  await loadRunsJson();

  populateRunDropdown();

  refreshHourAvailability();

  setFrame(0);

  setInterval(async () => {
    await refreshViewer();
  }, 30000);
}


init();
</script>

</body>
</html>
