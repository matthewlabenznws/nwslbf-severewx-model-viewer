<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>CAMs Viewer</title>

  <style>

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background: #1a1a1a;
      padding: 12px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .navbar a:hover {
      color: #6ea8ff;
    }

    .navbar span {
      color: #777;
    }

    .subbar {
      background: #151515;
      padding: 9px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 16px;
      font-weight: bold;
    }

    .subbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .subbar a:hover {
      color: #6ea8ff;
    }

    .subbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 10px 14px;
      border-bottom: 1px solid #444;

      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      font-weight: bold;
    }

    .topbar label {
      font-weight: bold;
    }

    .topbar select {
      min-width: 120px;
    }

    #runSelect {
      min-width: 170px;
    }

    #domainSelect {
      min-width: 150px;
    }

    #memberBlock {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      padding: 8px 12px;
      background: #181818;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      padding: 8px;
      background: #0f0f0f;
    }

    .frame {
      min-width: 44px;
      padding: 5px 8px;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
      cursor: pointer;
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .frame:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .active {
      outline: 2px solid white;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 320px);
      border: 1px solid #333;
      background: #000;
    }

  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>
  <a href="cams.html?model=hrrr">CAMs</a>
  <span>/</span>
  <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="subbar">
  <a href="cams.html?model=hrrr">HRRR</a>
  <span>/</span>
  <a href="cams.html?model=rrfs">RRFS</a>
  <span>/</span>
  <a href="cams.html?model=refs&member=m01">REFS MEM01-05</a>
</div>

<div class="topbar">

  <b id="viewerTitle">HRRR Reflectivity / UH</b>

  <label>Model:</label>

  <select id="modelSelect" onchange="changeModel()">
    <option value="hrrr">HRRR</option>
    <option value="rrfs">RRFS</option>
    <option value="refs">REFS</option>
  </select>

  <span id="memberBlock">

    <label>Member:</label>

    <select id="memberSelect" onchange="changeMember()">
      <option value="m01">M01</option>
      <option value="m02">M02</option>
      <option value="m03">M03</option>
      <option value="m04">M04</option>
      <option value="m05">M05</option>
    </select>

  </span>

  <label>Product:</label>

  <select id="productSelect" onchange="changeProduct()"></select>

  <label>Run:</label>

  <select id="runSelect" onchange="changeRun()"></select>

  <label>Domain:</label>

  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>

</div>

<div class="controls">

  <button onclick="togglePlay()" id="playBtn">
    ▶ Play
  </button>

  <button onclick="latestRun()">
    Latest
  </button>

  <input id="slider" type="range" min="0" max="48" value="0">

  <div id="fhrLabel">000</div>

</div>

<div class="tiles" id="tiles"></div>

<br>

<img id="plot" src="">

<script>

const BASE_URL =
  "https://data.nwslbfmtlsvrwx.com";

const params =
  new URLSearchParams(window.location.search);

let selectedModel =
  params.get("model") || "hrrr";

let selectedMember =
  params.get("member") || "m01";

let selectedProduct =
  params.get("product") || "refl_uh";

let selectedRun = "";

let selectedDomain = "regional";

let current = 0;

let maxFhr = 48;

let availableFrames = [];

let playing = false;

let timer = null;

let runs = [];

const modelSelect =
  document.getElementById("modelSelect");

const memberSelect =
  document.getElementById("memberSelect");

const memberBlock =
  document.getElementById("memberBlock");

const productSelect =
  document.getElementById("productSelect");

const runSelect =
  document.getElementById("runSelect");

const domainSelect =
  document.getElementById("domainSelect");

const slider =
  document.getElementById("slider");

const plot =
  document.getElementById("plot");

const tiles =
  document.getElementById("tiles");

const fhrLabel =
  document.getElementById("fhrLabel");

const playBtn =
  document.getElementById("playBtn");

const viewerTitle =
  document.getElementById("viewerTitle");

modelSelect.value = selectedModel;
memberSelect.value = selectedMember;

function updateMemberVisibility() {

  if (selectedModel === "refs") {
    memberBlock.style.display = "inline-flex";
  }

  else {
    memberBlock.style.display = "none";
  }
}

function addProductOption(value, label) {

  const opt =
    document.createElement("option");

  opt.value = value;
  opt.textContent = label;

  productSelect.appendChild(opt);
}

function updateProductOptions() {

  productSelect.innerHTML = "";

  if (selectedModel === "hrrr") {

    addProductOption(
      "refl_uh",
      "Reflectivity/UH"
    );

    addProductOption(
      "hail_swath",
      "Hail Swath"
    );

    addProductOption(
      "max_uh_02",
      "Max 0-2 km UH"
    );
  }

  else if (selectedModel === "rrfs") {

    addProductOption(
      "refl_uh",
      "Reflectivity/UH"
    );

    addProductOption(
      "hail_swath",
      "Hail Swath"
    );
  }

  else if (selectedModel === "refs") {

    addProductOption(
      "refl_uh",
      "Reflectivity/UH"
    );
  }

  productSelect.value = selectedProduct;
}

function updateTitle() {

  let modelLabel =
    selectedModel.toUpperCase();

  if (selectedModel === "refs") {
    modelLabel =
      `REFS ${selectedMember.toUpperCase()}`;
  }

  let productLabel =
    productSelect.options[
      productSelect.selectedIndex
    ]?.text || "";

  viewerTitle.textContent =
    `${modelLabel} ${productLabel}`;
}

function getProductPath() {

  if (selectedModel === "refs") {

    return (
      `/runs/cams/refs/` +
      `${selectedMember}/` +
      `${selectedProduct}`
    );
  }

  return (
    `/runs/cams/${selectedModel}/` +
    `${selectedProduct}`
  );
}

function getFileName(fhr) {

  const f =
    String(fhr).padStart(3, "0");

  if (selectedModel === "refs") {

    return (
      `refs_${selectedMember}` +
      `_lbf_f${f}.png`
    );
  }

  if (selectedProduct === "hail_swath") {

    return (
      `${selectedModel}` +
      `_hail_swath_f${f}.png`
    );
  }

  if (selectedProduct === "max_uh_02") {

    return (
      `${selectedModel}` +
      `_max_uh_02_f${f}.png`
    );
  }

  return (
    `${selectedModel}` +
    `_lbf_f${f}.png`
  );
}

function imgSrc(fhr) {

  if (!selectedRun) return "";

  return (
    BASE_URL +
    getProductPath() +
    "/" +
    selectedRun +
    "/" +
    selectedDomain +
    "/" +
    getFileName(fhr) +
    "?t=" +
    Date.now()
  );
}

async function loadRunsJson() {

  let runsPath;

  if (selectedModel === "refs") {

    runsPath =
      `${BASE_URL}/runs/cams/refs/` +
      `${selectedMember}/` +
      `${selectedProduct}/runs.json`;
  }

  else {

    runsPath =
      `${BASE_URL}/runs/cams/` +
      `${selectedModel}/` +
      `${selectedProduct}/runs.json`;
  }

  try {

    const response =
      await fetch(runsPath);

    runs =
      await response.json();

    if (runs.length > 0) {
      selectedRun = runs[0];
    }
  }

  catch(err) {
    console.error(err);
  }
}

function populateRunDropdown() {

  runSelect.innerHTML = "";

  runs.forEach(run => {

    const opt =
      document.createElement("option");

    opt.value = run;
    opt.textContent = run;

    runSelect.appendChild(opt);
  });

  runSelect.value = selectedRun;
}

async function refreshHourAvailability() {

  tiles.innerHTML = "";

  availableFrames = [];

  maxFhr =
    selectedProduct === "hail_swath"
    ? 48
    : 18;

  slider.max = maxFhr;

  for (let f = 0; f <= maxFhr; f++) {

    const button =
      document.createElement("button");

    button.className =
      "frame missing";

    button.textContent =
      String(f).padStart(3, "0");

    button.disabled = true;

    try {

      const response =
        await fetch(imgSrc(f), {
          method: "HEAD"
        });

      if (response.ok) {

        availableFrames.push(f);

        button.disabled = false;

        button.className =
          "frame available";

        button.onclick = () => {
          setFrame(f);
        };
      }
    }

    catch(err) {}

    tiles.appendChild(button);
  }
}

function firstAvailableFrame() {

  if (availableFrames.length === 0) {
    return 0;
  }

  return availableFrames[0];
}

function setFrame(fhr) {

  current = fhr;

  slider.value = current;

  fhrLabel.textContent =
    String(current).padStart(3, "0");

  plot.src =
    imgSrc(current);

  document.querySelectorAll(".frame")
    .forEach((btn, idx) => {

      btn.classList.remove("active");

      if (idx === current) {
        btn.classList.add("active");
      }
    });
}

slider.addEventListener("input", () => {
  setFrame(parseInt(slider.value));
});

function togglePlay() {

  playing = !playing;

  playBtn.textContent =
    playing
    ? "⏸ Pause"
    : "▶ Play";

  if (!playing) {

    clearInterval(timer);
    return;
  }

  timer = setInterval(() => {

    let idx =
      availableFrames.indexOf(current);

    idx++;

    if (idx >= availableFrames.length) {
      idx = 0;
    }

    setFrame(availableFrames[idx]);

  }, 700);
}

async function refreshViewer() {

  await loadRunsJson();

  populateRunDropdown();

  await refreshHourAvailability();
}

async function latestRun() {

  await refreshViewer();

  setFrame(firstAvailableFrame());
}

async function changeModel() {

  selectedModel =
    modelSelect.value;

  updateMemberVisibility();

  updateProductOptions();

  updateTitle();

  await refreshViewer();

  setFrame(firstAvailableFrame());
}

async function changeMember() {

  selectedMember =
    memberSelect.value;

  updateTitle();

  await refreshViewer();

  setFrame(firstAvailableFrame());
}

async function changeProduct() {

  selectedProduct =
    productSelect.value;

  updateTitle();

  await refreshViewer();

  setFrame(firstAvailableFrame());
}

async function changeRun() {

  selectedRun =
    runSelect.value;

  await refreshHourAvailability();

  setFrame(firstAvailableFrame());
}

async function changeDomain() {

  selectedDomain =
    domainSelect.value;

  await refreshHourAvailability();

  setFrame(firstAvailableFrame());
}

async function init() {

  updateMemberVisibility();

  updateProductOptions();

  updateTitle();

  await loadRunsJson();

  populateRunDropdown();

  await refreshHourAvailability();

  setFrame(firstAvailableFrame());

  setInterval(async () => {
    await refreshViewer();
  }, 30000);
}

init();

</script>

</body>
</html>
