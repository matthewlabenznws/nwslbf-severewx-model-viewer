<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NWS LBF Severe Weather Model Viewer</title>

<style>
body{
    margin:0;
    background:linear-gradient(to bottom,#111 0%,#080808 100%);
    color:white;
    font-family:Arial,sans-serif;
}

.navbar{
    background:#1a1a1a;
    padding:14px 24px;
    border-bottom:1px solid #333;
    font-size:22px;
    font-weight:bold;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 8px;
}

.navbar a:hover{
    color:#6ea8ff;
}

.navbar span{
    color:#777;
}

.topbar{
    padding:16px 18px;
    border-bottom:1px solid #333;
    background:#121212;
}

.viewer-title{
    font-size:26px;
    font-weight:800;
    margin-bottom:18px;
    text-align:center;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
}

.control-group{
    display:flex;
    align-items:center;
    gap:8px;
}

.control-group label{
    font-size:18px;
    font-weight:bold;
}

select{
    background:#232323;
    color:white;
    border:1px solid #444;
    border-radius:8px;
    padding:10px 14px;
    font-size:16px;
    font-weight:bold;
}

.slider-wrap{
    padding:14px 18px;
    border-bottom:1px solid #333;
    background:#111;
}

.slider-row{
    display:flex;
    align-items:center;
    gap:14px;
}

button{
    background:#232323;
    border:1px solid #444;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#2d2d2d;
}

#forecastSlider{
    flex:1;
}

#forecastLabel{
    font-size:18px;
    font-weight:bold;
    width:42px;
}

.hour-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:14px 14px 0 14px;
    justify-content:center;
}

.hour-btn{
    min-width:48px;
    background:#3b82f6;
    border:1px solid #7eaefc;
}

.hour-btn.active{
    background:white;
    color:black;
}

.image-container{
    text-align:center;
    padding:18px 10px 40px 10px;
}

#mainImage{
    width:95%;
    max-width:1700px;
    border-radius:10px;
    box-shadow:0 0 18px rgba(0,0,0,0.45);
    background:black;
}

.footer{
    color:#777;
    text-align:center;
    padding:34px 0 50px 0;
    line-height:1.6;
    font-size:15px;
}

@media(max-width:900px){

    .viewer-title{
        font-size:22px;
    }

    .controls{
        gap:10px;
    }

    .control-group label{
        font-size:16px;
    }

    select{
        font-size:14px;
    }

    .navbar{
        font-size:18px;
    }

    #mainImage{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html">HOME</a>
    <span>/</span>
    <a href="cams.html">CAMs</a>
    <span>/</span>
    <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="topbar">

    <div class="viewer-title" id="viewerTitle">
        REFS Severe Probability
    </div>

    <div class="controls">

        <div class="control-group">
            <label>Model:</label>

            <select id="modelSelect">
                <option value="refs">REFS</option>
                <option value="href">HREF</option>
            </select>
        </div>

        <div class="control-group">
            <label>Product:</label>

            <select id="productSelect">
                <option value="severe_prob">
                    UH > 75 & REFC > 40 Probability
                </option>

                <option value="storm_coverage">
                    Lightning & REFC > 40 Probability
                </option>

                <option value="organized_severe">
                    CAPE > 1500 & 0-6 km Shear > 40 kts Probability
                </option>

                <option value="wind_prob">
                    Wind > 58 mph & REFC > 40 Probability
                </option>
            </select>
        </div>

        <div class="control-group">
            <label>Run:</label>

            <select id="runSelect"></select>
        </div>

        <div class="control-group">
            <label>Domain:</label>

            <select id="domainSelect">
                <option value="regional">Regional</option>
                <option value="lbf">LBF</option>
                <option value="central_plains">Central Plains</option>
            </select>
        </div>

    </div>
</div>

<div class="slider-wrap">

    <div class="slider-row">

        <button id="playBtn">▶ Play</button>

        <button id="latestBtn">Latest</button>

        <input
            type="range"
            min="1"
            max="60"
            value="1"
            id="forecastSlider"
        >

        <div id="forecastLabel">000</div>

    </div>
</div>

<div class="hour-buttons" id="hourButtons"></div>

<div class="image-container">

    <img
        id="mainImage"
        src=""
        alt="Forecast image"
    >

</div>

<div class="footer">
    Developed by Matthew Labenz<br>
    NWS North Platte, Nebraska
</div>

<script>

const BASE_URL =
"https://mtl-nwslbf-model-data.s3.us-east-2.amazonaws.com";

const modelSelect   = document.getElementById("modelSelect");
const productSelect = document.getElementById("productSelect");
const runSelect     = document.getElementById("runSelect");
const domainSelect  = document.getElementById("domainSelect");

const slider        = document.getElementById("forecastSlider");
const label         = document.getElementById("forecastLabel");

const image         = document.getElementById("mainImage");
const hourButtons   = document.getElementById("hourButtons");

const viewerTitle   = document.getElementById("viewerTitle");

let currentFhr = 1;
let animationInterval = null;

function getProductPath(){

    const model   = modelSelect.value;
    const product = productSelect.value;

    if(model === "href"){
        return `/runs/mesoensprob/href/${product}`;
    }

    return `/runs/mesoensprob/refs/${product}`;
}

async function loadRuns(){

    const path = getProductPath();

    try{

        const response =
            await fetch(BASE_URL + path + "/runs.json?t=" + Date.now());

        const data = await response.json();

        runSelect.innerHTML = "";

        (data.runs || []).forEach(run => {

            const option = document.createElement("option");

            option.value = run.id || run;

            option.textContent = run.label || run.id || run;

            runSelect.appendChild(option);

        });

        updateImage();

    }catch(err){

        console.error(err);

    }
}

function getFileName(fhr){

    const model   = modelSelect.value;
    const product = productSelect.value;

    if(model === "href"){

        const f = String(fhr).padStart(2,"0");

        return `href_${product}_f${f}.png`;
    }

    const f = String(fhr).padStart(3,"0");

    return `refs_${product}_f${f}.png`;
}

function updateTitle(){

    const model =
        modelSelect.value.toUpperCase();

    const productText =
        productSelect.options[
            productSelect.selectedIndex
        ].text;

    viewerTitle.textContent =
        `${model} ${productText}`;
}

function updateImage(){

    const model   = modelSelect.value;
    const product = productSelect.value;
    const run     = runSelect.value;
    const domain  = domainSelect.value;

    const fileName = getFileName(currentFhr);

    const path =
        BASE_URL +
        getProductPath() +
        `/${run}/${domain}/${fileName}?t=${Date.now()}`;

    image.src = path;

    label.textContent =
        String(currentFhr).padStart(3,"0");

    updateButtons();

    updateTitle();
}

function updateButtons(){

    document.querySelectorAll(".hour-btn")
        .forEach(btn => {

            btn.classList.remove("active");

            if(Number(btn.dataset.hour) === currentFhr){
                btn.classList.add("active");
            }
        });
}

function buildHourButtons(){

    hourButtons.innerHTML = "";

    for(let i=0;i<=60;i++){

        const btn = document.createElement("button");

        btn.className = "hour-btn";

        btn.textContent =
            String(i).padStart(3,"0");

        btn.dataset.hour = i;

        btn.onclick = () => {

            currentFhr = i;

            slider.value = i;

            updateImage();

        };

        hourButtons.appendChild(btn);
    }
}

slider.addEventListener("input", () => {

    currentFhr = Number(slider.value);

    updateImage();

});

document.getElementById("latestBtn")
.addEventListener("click", () => {

    currentFhr = 60;

    slider.value = 60;

    updateImage();

});

document.getElementById("playBtn")
.addEventListener("click", () => {

    if(animationInterval){

        clearInterval(animationInterval);

        animationInterval = null;

        return;
    }

    animationInterval = setInterval(() => {

        currentFhr++;

        if(currentFhr > 60){
            currentFhr = 1;
        }

        slider.value = currentFhr;

        updateImage();

    },500);

});

modelSelect.addEventListener("change", loadRuns);
productSelect.addEventListener("change", loadRuns);

runSelect.addEventListener("change", updateImage);
domainSelect.addEventListener("change", updateImage);

buildHourButtons();

loadRuns();

</script>

</body>
</html>
