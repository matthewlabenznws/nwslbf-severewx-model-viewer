<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MESO-ENS PROB Viewer</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #111 0%, #080808 100%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background: #1a1a1a;
      padding: 14px 24px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 22px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 8px;
      transition: 0.2s ease;
    }

    .navbar a:hover {
      color: #6ea8ff;
      text-shadow: 0 0 10px rgba(110,168,255,0.35);
    }

    .navbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    select,
    button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #555;
      padding: 7px 12px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    select:hover,
    button:hover {
      border-color: #6ea8ff;
      box-shadow: 0 0 10px rgba(110,168,255,0.2);
    }

    .topbar label {
      font-weight: bold;
    }

    #memberBlock {
      display: none;
    }

    #viewerTitle {
      font-size: 22px;
      font-weight: 800;
      margin-right: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 12px;
      padding: 12px 16px;
      background: #181818;
      border-bottom: 1px solid #2c2c2c;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      padding: 10px;
      background: #101010;
    }

    .frame {
      min-width: 44px;
      padding: 6px 9px;
      border-radius: 5px;
      transition: 0.2s ease;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
      cursor: pointer;
    }

    .available:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(110,168,255,0.35);
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .frame:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .active {
      outline: 2px solid white;
    }

    .plot-wrap {
      padding: 16px;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 300px);
      border: 1px solid #333;
      border-radius: 10px;
      background: #000;
      box-shadow: 0 0 22px rgba(0,0,0,0.45);
    }

    .footer {
      color: #777;
      font-size: 15px;
      margin: 28px 0 34px 0;
      line-height: 1.6;
    }

    .profile-pic {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #444;
      margin-bottom: 12px;
      box-shadow: 0 0 14px rgba(255,255,255,0.08);
    }

    @media (max-width: 700px) {

      .navbar {
        font-size: 18px;
      }

      #viewerTitle {
        width: 100%;
        margin-bottom: 8px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      #plot {
        max-height: calc(100vh - 420px);
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>
  <a href="cams.html">CAMs</a>
  <span>/</span>
  <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="topbar">

  <b id="viewerTitle">HREF UH > 75 & REFC > 40 Probability</b>

  <label>Model:</label>
  <select id="modelSelect" onchange="changeModel()">
    <option value="href">HREF</option>
    <option value="refs">REFS</option>
  </select>

  <span id="memberBlock">
    <label>Member:</label>
    <select id="memberSelect" onchange="changeMember()">
      <option value="m01">M01</option>
    </select>
  </span>

  <label>Product:</label>
  <select id="productSelect" onchange="changeProduct()"></select>

  <label>Run:</label>
  <select id="runSelect" onchange="changeRun()"></select>

  <label>Domain:</label>
  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>

</div>

<div class="controls">
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  <button onclick="latestRun()">Latest</button>
  <input id="slider" type="range" min="0" max="48" value="0">
  <div id="fhrLabel">00</div>
</div>

<div class="tiles" id="tiles"></div>

<div class="plot-wrap">
  <img id="plot" src="">
</div>

<div class="footer">

  <img
    src="assets/profile.jpg"
    alt="Matthew Labenz"
    class="profile-pic"
  >

  <br>

  Developed by Matthew Labenz<br>
  NWS North Platte, Nebraska

</div>

</script>

</body>
</html>
