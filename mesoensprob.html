<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MESO-ENS PROB Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background: #1a1a1a;
      padding: 12px 18px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 6px;
    }

    .navbar a:hover {
      color: #6ea8ff;
    }

    .navbar span {
      color: #777;
    }

    .topbar {
      background: #1b1b1b;
      padding: 10px 14px;
      border-bottom: 1px solid #444;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      font-weight: bold;
    }

    .topbar label {
      font-weight: bold;
    }

    #memberBlock {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      padding: 8px 12px;
      background: #181818;
    }

    input[type="range"] {
      width: 100%;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      padding: 8px;
      background: #0f0f0f;
    }

    .frame {
      min-width: 44px;
      padding: 5px 8px;
    }

    .available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
      cursor: pointer;
    }

    .missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .frame:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .active {
      outline: 2px solid white;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 300px);
      border: 1px solid #333;
      background: #000;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <span>/</span>
  <a href="cams.html">CAMs</a>
  <span>/</span>
  <a href="mesoensprob.html">MESO-ENS PROB</a>
</div>

<div class="topbar">

  <b id="viewerTitle">HREF UH > 75 & REFC > 40 Probability</b>

  <label>Model:</label>
  <select id="modelSelect" onchange="changeModel()">
    <option value="href">HREF</option>
    <option value="refs">REFS</option>
  </select>

  <span id="memberBlock">
    <label>Member:</label>
    <select id="memberSelect" onchange="changeMember()">
      <option value="m01">M01</option>
    </select>
  </span>

  <label>Product:</label>
  <select id="productSelect" onchange="changeProduct()"></select>

  <label>Run:</label>
  <select id="runSelect" onchange="changeRun()"></select>

  <label>Domain:</label>
  <select id="domainSelect" onchange="changeDomain()">
    <option value="regional">Regional</option>
    <option value="lbf">LBF</option>
    <option value="central_plains">Central Plains</option>
    <option value="spc_severe">SPC Severe</option>
  </select>

</div>

<div class="controls">
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  <button onclick="latestRun()">Latest</button>
  <input id="slider" type="range" min="0" max="48" value="0">
  <div id="fhrLabel">00</div>
</div>

<div class="tiles" id="tiles"></div>

<br>

<img id="plot" src="">

<script>
const BASE_URL = "https://data.nwslbfmtlsvrwx.com";

let selectedModel = "href";
let selectedMember = "m01";
let selectedProduct = "severe_prob";
let selectedRun = "";
let selectedDomain = "regional";

let current = 0;
let maxFhr = 48;
let availableFrames = [];
let playing = false;
let timer = null;
let runs = [];

const modelSelect = document.getElementById("modelSelect");
const memberSelect = document.getElementById("memberSelect");
const memberBlock = document.getElementById("memberBlock");
const productSelect = document.getElementById("productSelect");
const runSelect = document.getElementById("runSelect");
const domainSelect = document.getElementById("domainSelect");
const slider = document.getElementById("slider");
const plot = document.getElementById("plot");
const tiles = document.getElementById("tiles");
const fhrLabel = document.getElementById("fhrLabel");
const playBtn = document.getElementById("playBtn");
const viewerTitle = document.getElementById("viewerTitle");

function addProductOption(value, label) {
  const opt = document.createElement("option");
  opt.value = value;
  opt.textContent = label;
  productSelect.appendChild(opt);
}

function updateProductOptions() {
  productSelect.innerHTML = "";

  addProductOption("severe_prob", "UH > 75 & REFC > 40 Probability");
  addProductOption("storm_coverage", "Storm Coverage Probability");
  addProductOption("organized_severe", "Organized Severe Probability");
  addProductOption("tornado_rotation", "Tornado/Rotation Probability");
  addProductOption("wind_prob", "Severe Wind Probability");

  productSelect.value = selectedProduct;
}

function updateMemberVisibility() {
  memberBlock.style.display =
    selectedModel === "refs" ? "inline-flex" : "none";
}

function productLabel() {
  return productSelect.options[productSelect.selectedIndex]?.text || "";
}

function updateTitle() {
  let modelLabel = selectedModel.toUpperCase();

  if (selectedModel === "refs") {
    modelLabel = "REFS " + selectedMember.toUpperCase();
  }

  viewerTitle.textContent = modelLabel + " " + productLabel();
}

function getProductPath() {
  if (selectedModel === "href") {
    return `/runs/mesoensprob/href/${selectedProduct}`;
  }

  return `/runs/mesoens/refs/${selectedMember}/${selectedProduct}`;
}

function getFileName(fhr) {
  if (selectedModel === "href") {
    const f = String(fhr).padStart(2, "0");
    return `href_${selectedProduct}_f${f}.png`;
  }

  const f = String(fhr).padStart(3, "0");
  return `refs_${selectedMember}_${selectedProduct}_f${f}.png`;
}

function imgSrc(fhr) {
  if (!selectedRun) return "";

  return (
    BASE_URL +
    getProductPath() +
    "/" +
    selectedRun +
    "/" +
    selectedDomain +
    "/" +
    getFileName(fhr) +
    "?t=" +
    Date.now()
  );
}

function runId(run) {
  if (typeof run === "string") return run;
  return run.id;
}

function runLabel(run) {
  if (typeof run === "string") return run.replace("_", " ");
  return run.label || run.id;
}

async function loadRunsJson() {
  const path =
    BASE_URL +
    getProductPath() +
    "/runs.json?t=" +
    Date.now();

  try {
    const response = await fetch(path);
    const data = await response.json();

    runs = data.runs || [];

    if (runs.length > 0) {
      selectedRun = runId(runs[0]);
    } else {
      selectedRun = "";
    }

  } catch(err) {
    console.error("Could not load runs.json:", path, err);
    runs = [];
    selectedRun = "";
  }
}

function populateRunDropdown() {
  runSelect.innerHTML = "";

  runs.forEach(run => {
    const opt = document.createElement("option");
    opt.value = runId(run);
    opt.textContent = runLabel(run);
    runSelect.appendChild(opt);
  });

  runSelect.value = selectedRun;
}

function updateMaxFhrForRun() {
  const runObj = runs.find(r => runId(r) === selectedRun);

  if (
    runObj &&
    typeof runObj !== "string" &&
    runObj.max_fhr !== undefined
  ) {
    maxFhr = Number(runObj.max_fhr);
  } else {
    maxFhr = selectedModel === "href" ? 48 : 60;
  }

  slider.max = maxFhr;
}

async function refreshHourAvailability() {
  tiles.innerHTML = "";
  availableFrames = [];

  updateMaxFhrForRun();

  for (let f = 0; f <= maxFhr; f++) {
    const button = document.createElement("button");

    button.className = "frame missing";
    button.textContent =
      selectedModel === "href"
      ? String(f).padStart(2, "0")
      : String(f).padStart(3, "0");

    button.disabled = true;

    try {
      const response =
        await fetch(imgSrc(f), { method: "HEAD" });

      if (response.ok) {
        availableFrames.push(f);
        button.disabled = false;
        button.className = "frame available";
        button.onclick = () => setFrame(f);
      }

    } catch(err) {}

    tiles.appendChild(button);
  }
}

function firstAvailableFrame() {
  return availableFrames.length > 0 ? availableFrames[0] : 0;
}

function setFrame(fhr) {
  if (!selectedRun) return;

  current = fhr;
  slider.value = current;

  fhrLabel.textContent =
    selectedModel === "href"
    ? String(current).padStart(2, "0")
    : String(current).padStart(3, "0");

  plot.src = imgSrc(current);

  document.querySelectorAll(".frame").forEach((btn, idx) => {
    btn.classList.remove("active");
    if (idx === current) btn.classList.add("active");
  });
}

slider.addEventListener("input", () => {
  const f = parseInt(slider.value);

  if (availableFrames.includes(f)) {
    setFrame(f);
  } else {
    slider.value = current;
  }
});

function togglePlay() {
  playing = !playing;

  playBtn.textContent =
    playing ? "⏸ Pause" : "▶ Play";

  if (!playing) {
    clearInterval(timer);
    return;
  }

  timer = setInterval(() => {
    if (availableFrames.length === 0) return;

    let idx = availableFrames.indexOf(current);
    idx++;

    if (idx >= availableFrames.length) idx = 0;

    setFrame(availableFrames[idx]);

  }, 700);
}

async function refreshViewer() {
  await loadRunsJson();
  populateRunDropdown();
  await refreshHourAvailability();
}

async function latestRun() {
  selectedRun = "";
  await refreshViewer();
  setFrame(firstAvailableFrame());
}

async function changeModel() {
  selectedModel = modelSelect.value;
  selectedRun = "";
  plot.src = "";

  if (selectedModel === "href") {
    maxFhr = 48;
  } else {
    maxFhr = 60;
  }

  updateMemberVisibility();
  updateProductOptions();
  updateTitle();

  await refreshViewer();
  setFrame(firstAvailableFrame());
}

async function changeMember() {
  selectedMember = memberSelect.value;
  selectedRun = "";
  plot.src = "";

  updateTitle();

  await refreshViewer();
  setFrame(firstAvailableFrame());
}

async function changeProduct() {
  selectedProduct = productSelect.value;
  selectedRun = "";
  plot.src = "";

  updateTitle();

  await refreshViewer();
  setFrame(firstAvailableFrame());
}

async function changeRun() {
  selectedRun = runSelect.value;

  await refreshHourAvailability();
  setFrame(firstAvailableFrame());
}

async function changeDomain() {
  selectedDomain = domainSelect.value;

  await refreshHourAvailability();
  setFrame(firstAvailableFrame());
}

async function init() {
  updateMemberVisibility();
  updateProductOptions();
  updateTitle();

  await refreshViewer();
  setFrame(firstAvailableFrame());

  setInterval(async () => {
    await refreshViewer();
  }, 30000);
}

init();
</script>

</body>
</html>
